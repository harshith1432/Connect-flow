{% extends 'base.html' %}
{% block title %}Create Module{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
  <div class="card">
    <div class="mb-4">
      <h3>Create New Module</h3>
      <p style="color: var(--text-muted);">Content module for worker training</p>
    </div>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="form-group">
        <label class="form-label">Module Name</label>
        <input name="name" class="form-control" placeholder="e.g. Safety Training 101" required />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4"
          placeholder="Brief description of the module content..."></textarea>
      </div>
      <div class="d-flex justify-between items-center mt-4">
        <a href="/org/modules" class="btn btn-secondary">Cancel</a>
        <button class="btn btn-primary">Create Module</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
