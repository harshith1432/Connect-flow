{% extends 'base.html' %}
{% block title %}Organization Login{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
  <div class="card">
    <div class="text-center mb-3">
      <h2 style="color: var(--primary);">Organization Login</h2>
      <p style="color: var(--text-muted);">Manage your organization and team</p>
    </div>
    <form method="post" action="/org/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input name="email" type="email" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button class="btn btn-primary w-full">Sign In</button>

      <div class="text-center mt-4">
        <a href="/org/register" style="font-size: 0.875rem;">Don't have an account? Register</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
