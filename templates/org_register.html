{% extends 'base.html' %}
{% block title %}Register Organization{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
  <div class="card">
    <div class="text-center mb-3">
      <h2 style="color: var(--primary);">Create an Account</h2>
      <p style="color: var(--text-muted);">Start managing your workforce today</p>
    </div>
    <form method="post" action="/org/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="form-group">
        <label class="form-label">Organization Name</label>
        <input name="name" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Admin Email</label>
        <input name="email" type="email" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button class="btn btn-primary w-full">Create Account</button>

      <div class="text-center mt-4">
        <a href="/org/login" style="font-size: 0.875rem;">Already have an account? Login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
