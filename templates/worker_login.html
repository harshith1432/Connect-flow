{% extends 'base.html' %}
{% block title %}Worker Login{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
  <div class="card">
    <div class="text-center mb-3">
      <h2 style="color: var(--secondary);">Worker Login</h2>
      <p style="color: var(--text-muted);">Access your workspace</p>
    </div>
    <form method="post" action="/worker/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input name="email" type="email" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button class="btn btn-primary w-full" style="background-color: var(--secondary);">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
