{% extends "base.html" %}

{% block title %}Select Organization{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Select Organization</h2>
            <p class="text-muted">You have multiple accounts associated with <strong>{{ email }}</strong>. Choose an
                organization to continue.</p>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius: 20px;">
            <div class="card-body p-4">
                <div class="list-group list-group-flush">
                    {% for user in matching_users %}
                    <form action="{{ url_for('org.login') }}" method="POST" class="mb-2">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="email" value="{{ email }}">
                        <input type="hidden" name="password" value="{{ password }}">
                        <input type="hidden" name="organization_id" value="{{ user.organization.id }}">

                        <button type="submit"
                            class="list-group-item list-group-item-action border rounded p-3 d-flex align-items-center gap-3">
                            <div class="org-logo-thumbnail" style="width: 40px; height: 40px;">
                                {% if user.organization.logo_url %}
                                <img src="{{ url_for('static', filename=user.organization.logo_url) }}" alt=""
                                    class="img-fluid rounded-circle">
                                {% else %}
                                <div
                                    class="bg-light rounded-circle d-flex align-items-center justify-content-center h-100">
                                    <i class="bi bi-building text-primary"></i>
                                </div>
                                {% endif %}
                            </div>
                            <div class="text-start">
                                <div class="fw-bold text-dark">{{ user.organization.name }}</div>
                                <div class="small text-muted">{{ user.role|capitalize }}</div>
                            </div>
                            <i class="bi bi-chevron-right ms-auto text-muted"></i>
                        </button>
                    </form>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('org.login') }}" class="text-decoration-none text-muted">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
